<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINEMAX - Кино тасалбар</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

/* Үндсэн өнгөний тохиргоо */
:root {
  --gold: #C9A84C;
  --gold-light: #E8C96A;
  --dark: #0D0D0D;
  --surface: #161616;
  --surface2: #1F1F1F;
  --border: rgba(201,168,76,0.2);
  --text: #F0EDE6;
  --muted: #7A7570;
  --red: #E03030;
}

/* Хуудасны үндсэн загвар */
body { background: var(--dark); font-family: 'DM Sans', sans-serif; color: var(--text); }

/* ТОЛГОЙ ХЭСЭГ */
.header {
  background: linear-gradient(180deg, #1a1208 0%, var(--dark) 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 24px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
/* Лого загвар */
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--gold); }
.logo span { color: var(--text); }
/* Навигацийн таб */
.nav-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 8px; padding: 4px; }
.tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; color: var(--muted); cursor: pointer; border: none; background: none; font-family: inherit; }
.tab.active { background: var(--gold); color: #0D0D0D; font-weight: 500; }

/* ҮНДСЭН БҮТЭЦ - 3 баганат grid */
.main { display: grid; grid-template-columns: 280px 1fr 340px; min-height: calc(100vh - 73px); }

/* КИНО ЖАГСААЛТ */
.movie-list { border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
.section-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 500; margin-bottom: 12px; }

/* Кино картын загвар */
.movie-card {
  display: flex; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface); margin-bottom: 10px; transition: all 0.2s;
}
.movie-card:hover { border-color: rgba(201,168,76,0.5); }
.movie-card.active { border-color: var(--gold); background: rgba(201,168,76,0.1); }
.movie-card img { width: 72px; height: 104px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.movie-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1.5px; line-height: 1.2; margin-bottom: 4px; }
.movie-card .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--gold); background: rgba(201,168,76,0.08); }
.tag.age { border-color: rgba(224,48,48,0.3); color: var(--red); background: rgba(224,48,48,0.1); }
.movie-card .meta { font-size: 11px; color: var(--muted); }
.movie-card .rating { font-size: 12px; margin-top: 4px; }
.movie-card .rating .star { color: var(--gold); }

/* ГОЛЫН ХЭСЭГ - Захиалгын хэсэг */
.center { padding: 24px; border-right: 1px solid var(--border); overflow-y: auto; }

/* Кино дэлгэрэнгүй мэдээлэл */
.movie-hero { display: flex; gap: 20px; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
.poster { width: 90px; height: 130px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }
.movie-info h1 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; line-height: 1.1; margin-bottom: 6px; }
.genre-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.info-meta { font-size: 13px; color: var(--muted); line-height: 1.8; }
.info-meta strong { color: var(--text); font-weight: 400; }
.stars-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.stars { color: var(--gold); font-size: 14px; letter-spacing: 1px; }

.section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; font-weight: 500; }

/* Огноо сонгогч */
.dates { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px; }
.date-pill { flex-shrink: 0; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; text-align: center; transition: all 0.2s; }
.date-pill:hover { border-color: var(--gold); }
.date-pill.active { background: var(--gold); border-color: var(--gold); }
.date-pill.active .d-day { color: rgba(0,0,0,0.6); }
.date-pill.active .d-num { color: #0D0D0D; font-weight: 600; }
.d-day { font-size: 11px; color: var(--muted); display: block; letter-spacing: 1px; }
.d-num { font-size: 20px; font-weight: 300; color: var(--text); display: block; }

/* Цагийн хуваарь */
.shows { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
.showtime { padding: 10px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; text-align: center; transition: all 0.2s; }
.showtime:hover { border-color: var(--gold); }
.showtime.active { background: var(--surface2); border-color: var(--gold); }
.showtime.sold { opacity: 0.3; cursor: not-allowed; }
.show-time { font-size: 16px; display: block; }
.show-hall { font-size: 11px; color: var(--muted); display: block; margin-top: 2px; letter-spacing: 0.5px; }
.showtime.active .show-hall { color: var(--gold); }

/* Дэлгэцийн хэсэг */
.screen-wrap { text-align: center; margin-bottom: 20px; }
.screen-line { width: 70%; height: 4px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0 auto 6px; border-radius: 2px; opacity: 0.6; }
.screen-label { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }

/* Суудлын зураглал */
.seat-grid { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-bottom: 16px; }
.seat-row { display: flex; align-items: center; gap: 5px; }
.row-label { font-size: 11px; color: var(--muted); width: 16px; text-align: center; font-weight: 500; }
/* Суудлын загвар */
.seat { width: 24px; height: 22px; border-radius: 4px 4px 2px 2px; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; }
.seat.free { background: var(--surface2); border-color: rgba(255,255,255,0.1); }
.seat.free:hover { background: rgba(201,168,76,0.3); border-color: var(--gold); transform: scale(1.1); }
.seat.selected { background: var(--gold); border-color: var(--gold-light); }
.seat.taken { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.04); cursor: not-allowed; }
.seat.vip { background: var(--surface2); border-color: rgba(201,168,76,0.4); }
.seat.vip.free:hover { background: rgba(201,168,76,0.3); }
.seat.gap { background: none; border: none; cursor: default; width: 10px; }

/* Тэмдэглэгээ */
.legend { display: flex; gap: 16px; justify-content: center; margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.legend-dot { width: 14px; height: 13px; border-radius: 3px 3px 1px 1px; border: 1px solid transparent; }

/* БАРУУН САМБАР - Захиалгын хураангуй */
.right { padding: 24px; background: var(--surface); display: flex; flex-direction: column; }
.summary-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--gold); margin-bottom: 20px; }
/* Сонгосон мэдээлэл */
.selected-info { background: var(--surface2); border-radius: 10px; padding: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
.info-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.info-row:last-child { border-bottom: none; }
.info-row .label { color: var(--muted); }
.info-row .val { color: var(--text); }

/* Сонгосон суудлын чипүүд */
.seat-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; min-height: 36px; }
.seat-chip { background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--gold); animation: popIn 0.2s ease; }
@keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.no-seats { font-size: 12px; color: var(--muted); font-style: italic; }

/* Үнийн мөр */
.price-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; color: var(--muted); }
.price-row.total { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 12px; font-size: 16px; color: var(--text); font-weight: 500; }
.price-row.total .amt { color: var(--gold); font-size: 18px; }

/* Промо код оруулах талбар */
.promo-input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
.promo-input:focus { border-color: var(--gold); }
.promo-input::placeholder { color: var(--muted); }

/* Захиалах товч */
.btn-book { margin-top: auto; width: 100%; padding: 14px; background: var(--gold); color: #0D0D0D; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; }
.btn-book:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-book:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* АМЖИЛТТАЙ ЗАХИАЛГЫН МОДАЛ */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 10; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; text-align: center; max-width: 320px; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.check-circle { width: 64px; height: 64px; border-radius: 50%; background: rgba(201,168,76,0.15); border: 2px solid var(--gold); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--gold); margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
.btn-close { padding: 10px 28px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; transition: all 0.2s; }
.btn-close:hover { border-color: var(--gold); color: var(--gold); }
</style>
</head>

<!-- ТОЛГОЙ ХЭСЭГ: Лого болон навигаци -->
<div class="header">

<script>
/* ===== ТОГТМОЛ УТГУУД ===== */
const NORMAL_PRICE = 15000; /* Ердийн суудлын үнэ */
const VIP_PRICE = 25000; /* VIP суудлын үнэ */
const VIP_ROWS = ['F','G']; /* VIP эгнээнүүд */
const ROWS = ['A','B','C','D','E','F','G']; /* Бүх эгнээ */
const SEATS_PER_ROW = 10; /* Эгнээ бүрийн суудлын тоо */
/* Кино тус бүрийн суурь захиалагдсан суудлууд (movie id -> seat list) */
const TAKEN_BY_MOVIE = {
  dune: ['A3','A4','B7','B8','C2','C5','C6','D9','E1','F4','F5','G3','G7'],
  god:  ['A1','A2','B3','C8','C9','D2','D3','E5','E6','E7','F1','G9','G10'],
  int:  ['A6','A7','A8','B1','B5','C4','D6','D7','E2','E8','F8','F9','G2'],
  bat:  ['A5','B2','B6','B9','C1','C3','C7','D4','D5','E3','E9','F2','G5','G6'],
  kfp:  ['A9','A10','B4','B10','C10','D1','D8','D10','E4','E10','F7','F10','G1','G4'],
  opp:  ['A2','A5','B1','B6','C2','C7','D3','D5','D9','E1','E7','F3','F6','G8','G10'],
};

/* Тогтвортой санамсаргүй тоо үүсгэгч (seed дээр үндэслэсэн) */
function seededRand(seed) {
  let h = 2166136261;
  for (let i = 0; i < seed.length; i++) {
    h ^= seed.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return () => {
    h += 0x6D2B79F5;
    let t = h;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* Кино + огноо + цаг хослол бүрт өвөрмөц захиалагдсан суудлуудыг үүсгэх */
function computeTaken(movieId, dateIdx, showIdx) {
  const base = TAKEN_BY_MOVIE[movieId] || [];
  const rand = seededRand(`${movieId}|${dateIdx}|${showIdx}`);
  const allSeats = [];
  ROWS.forEach(r => { for (let s = 1; s <= SEATS_PER_ROW; s++) allSeats.push(r + s); });

  /* Суурь жагсаалтаас санамсаргүй хэсгийг сонгоно (60-100%) */
  const keepRatio = 0.6 + rand() * 0.4;
  const taken = new Set(base.filter(() => rand() < keepRatio));

  /* Нэмэлт санамсаргүй суудлуудыг нэмнэ (нийт 8-22 ширхэг болтол) */
  const target = 8 + Math.floor(rand() * 15);
  let guard = 0;
  while (taken.size < target && guard++ < 200) {
    const seat = allSeats[Math.floor(rand() * allSeats.length)];
    taken.add(seat);
  }
  return Array.from(taken);
}

/* Тухайн идэвхтэй киноны захиалагдсан суудлууд */

/* ===== ОГНООНУУД ===== */
const DATES = [
  {day:"МЯГ",num:"17"},{day:"ЛХА",num:"18"},{day:"ПҮР",num:"19"},
  {day:"БАА",num:"20"},{day:"БЯМ",num:"21"},{day:"НЯМ",num:"22"},{day:"ДАВ",num:"23"}
];


/* ===== ТӨЛВИЙН ХУВЬСАГЧИД ===== */
let currentMovie = 0; /* Одоо сонгосон кино */
let currentDate = 0; /* Одоо сонгосон огноо */
let currentShow = 0; /* Одоо сонгосон цаг */
let selectedSeats = new Set(); /* Сонгосон суудлууд */


/* ===== ДҮРСЛЭХ ФУНКЦУУД ===== */

/* Бүх хэсгийг дахин зурах */
function render() {
  /* Кино + огноо + цаг хослолд харгалзах захиалагдсан суудлуудыг тооцоолох */
  TAKEN = computeTaken(movies[currentMovie].id, currentDate, currentShow);
  /* Хэрвээ сонгосон суудал захиалагдсан болсон бол хасах */
  Array.from(selectedSeats).forEach(s => { if (TAKEN.includes(s)) selectedSeats.delete(s); });
  renderMovieList();
  renderHero();
  renderDates();
  renderShows();
  buildGrid();
  updateSummary();
}

/* Кино жагсаалт зурах */
function renderMovieList() {
  const el = document.getElementById('movieList');
  el.innerHTML = movies.map((m, i) => `
    <div class="movie-card ${i === currentMovie ? 'active' : ''}" onclick="selectMovie(${i})">
      <img src="${m.poster}" alt="${m.title}">
      <div>
        <h3>${m.title}</h3>
        <div class="tags">${m.genres.map(g=>`<span class="tag">${g}</span>`).join('')}<span class="tag age">${m.age}</span></div>
        <div class="meta">${m.duration} · ${m.format}</div>
        <div class="rating"><span class="star">★</span> ${m.rating}</div>
      </div>
    </div>
  `).join('');
}


/* Кино дэлгэрэнгүй мэдээлэл зурах */
function renderHero() {
  const m = movies[currentMovie];
  document.getElementById('movieHero').innerHTML = `
    <img class="poster" src="${m.poster}" alt="${m.title}">
    <div class="movie-info">
      <h1>${m.title}</h1>
      <div class="genre-tags">${m.genres.map(g=>`<span class="tag">${g}</span>`).join('')}<span class="tag age">${m.age}</span></div>
      <div class="info-meta">
        <div><strong>${m.duration}</strong> &nbsp;·&nbsp; ${m.format}</div>
        <div>Найруулагч: ${m.director}</div>
      </div>
      <div class="stars-row">
        <span class="stars">★★★★★</span>
        <span style="font-size:14px;font-weight:500">${m.rating}</span>
        <span style="font-size:12px;color:var(--muted)">IMDb</span>
      </div>
    </div>`;
}


/* Огноо сонгогч зурах */
function renderDates() {
  document.getElementById('dates').innerHTML = DATES.map((d,i) => `
    <div class="date-pill ${i===currentDate?'active':''}" onclick="selectDate(${i})">
      <span class="d-day">${d.day}</span><span class="d-num">${d.num}</span>
    </div>`).join('');
}


/* Цагийн хуваарь зурах */
function renderShows() {
  const m = movies[currentMovie];
  document.getElementById('showtimes').innerHTML = m.shows.map((s,i) => `
    <div class="showtime ${s.sold?'sold':''} ${i===currentShow&&!s.sold?'active':''}" onclick="${s.sold?'':'selectShow('+i+')'}">
      <span class="show-time">${s.t}</span>
      <span class="show-hall">${s.sold?'ДУУСГАВАР':s.h.toUpperCase()}</span>
    </div>`).join('');
}


/* Суудлын зураглал үүсгэх */
function buildGrid() {
  const grid = document.getElementById('seatGrid');
  grid.innerHTML = '';
  ROWS.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'seat-row';
    rowEl.innerHTML = `<div class="row-label">${row}</div>`;
    const isVip = VIP_ROWS.includes(row);
    for (let s = 1; s <= SEATS_PER_ROW; s++) {
      if (s === 6) rowEl.innerHTML += '<div class="seat gap"></div>';
      const id = row + s;
      const taken = TAKEN.includes(id);
      const sel = selectedSeats.has(id);
      let cls = 'seat';
      if (taken) cls += ' taken';
      else if (sel) cls += ' selected';
      else { cls += ' free'; if (isVip) cls += ' vip'; }
      rowEl.innerHTML += `<div class="${cls}" onclick="${taken?'':'toggleSeat(\''+id+'\')'}"></div>`;
    }
    grid.appendChild(rowEl);
  });
}


/* Захиалгын хураангуй шинэчлэх */
function updateSummary() {
  const m = movies[currentMovie];
  const show = m.shows[currentShow];
  document.getElementById('summaryInfo').innerHTML = [
    ['Кино', m.title],['Огноо', '4-р сарын '+DATES[currentDate].num],
    ['Цаг', show?.t||'—'],['Танхим', show?.sold?'—':show?.h||'—']
  ].map(([l,v])=>`<div class="info-row"><span class="label">${l}</span><span class="val">${v}</span></div>`).join('');

  const seats = Array.from(selectedSeats);
  const chips = document.getElementById('seatChips');
  chips.innerHTML = seats.length === 0
    ? '<span class="no-seats">Суудал сонгоогүй байна</span>'
    : seats.map(s=>`<span class="seat-chip">${s}</span>`).join('');

  const normal = seats.filter(s=>!VIP_ROWS.includes(s[0]));
  const vip = seats.filter(s=>VIP_ROWS.includes(s[0]));
  const total = normal.length * NORMAL_PRICE + vip.length * VIP_PRICE;

  document.getElementById('priceBreakdown').innerHTML = `
    <div class="price-row"><span>Ердийн суудал (${normal.length})</span><span>₮${(normal.length*NORMAL_PRICE).toLocaleString()}</span></div>
    <div class="price-row"><span>VIP суудал (${vip.length})</span><span>₮${(vip.length*VIP_PRICE).toLocaleString()}</span></div>
    <div class="price-row total"><span>Нийт дүн</span><span class="amt">₮${total.toLocaleString()}</span></div>`;

  document.getElementById('bookBtn').disabled = seats.length === 0;
}


/* ===== ХЭРЭГЛЭГЧИЙН ҮЙЛДЛҮҮД ===== */

/* Кино сонгох */
/* Кино сонгох */
function selectMovie(i) { currentMovie = i; currentShow = 0; selectedSeats.clear(); render(); }
/* Огноо сонгох */
function selectDate(i) { currentDate = i; selectedSeats.clear(); render(); }
/* Цаг сонгох */
function selectShow(i) { currentShow = i; selectedSeats.clear(); render(); }
/* Суудал сонгох/цуцлах */
function toggleSeat(id) {
  if (selectedSeats.has(id)) selectedSeats.delete(id);
  else if (selectedSeats.size < 6) selectedSeats.add(id);
  buildGrid(); updateSummary();
}
/* Захиалга баталгаажуулах */
function confirmBooking() {
  const m = movies[currentMovie];
  document.getElementById('modalDetails').textContent =
    m.title + ' · 4-р сарын ' + DATES[currentDate].num + ' · ' + m.shows[currentShow].t + ' · ' + Array.from(selectedSeats).join(', ');
  document.getElementById('modal').classList.add('show');
}
/* Модал хаах */
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  selectedSeats.clear(); render();
}

/* Анхны дүрслэлийг эхлүүлэх */
render();
</script>
